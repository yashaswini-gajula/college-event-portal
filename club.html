<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Club President Login</title>
    <link rel="stylesheet" href="club.css">
</head>
<body>

<h1>Club President Login</h1>

<form onsubmit="return validateClub()">
    <input type="email" id="clubEmail" placeholder="Club Email" required>
    <input type="password" placeholder="Password" required>

    <button type="submit">Login</button>
    <p id="msg"></p>
</form>

<script>

function validateClub(){

let email = document.getElementById("clubEmail").value;
let password = document.querySelector("input[type='password']").value;
let msg = document.getElementById("msg");

let clubDomain = ".club@vitap.ac.in";

/* domain validation */

if(!email.endsWith(clubDomain)){

msg.style.color="red";
msg.innerHTML="Invalid club email ❌";

return false;

}

/* send to server */

fetch("http://localhost:3000/clubLogin",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
email:email,
password:password
})

})

.then(res=>res.json())

.then(data=>{

if(data.success){

msg.style.color="green";
msg.innerHTML=data.message;

/* redirect */

setTimeout(()=>{
window.location.href="clubDashboard.html";
},1000);

}
else{

msg.style.color="red";
msg.innerHTML=data.message;

}

})

.catch(err=>{

msg.style.color="red";
msg.innerHTML="Server error ❌";

})

return false;

}

</script>

</body>
</html>
